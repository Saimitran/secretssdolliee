<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>A Question for Dollie 💍</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 50%, #fdfbfb 100%);
      font-family: 'Georgia', serif;
      overflow: hidden;
    }

    .container {
      text-align: center;
      padding: 40px;
      background: rgba(255, 255, 255, 0.9);
      border-radius: 20px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
      max-width: 500px;
    }

    h1 {
      font-size: 2.5rem;
      color: #e75480;
      margin-bottom: 10px;
    }

    .question {
      font-size: 1.8rem;
      color: #333;
      margin: 30px 0;
      line-height: 1.4;
    }

    .highlight {
      color: #e75480;
      font-weight: bold;
    }

    .buttons {
      display: flex;
      justify-content: center;
      gap: 30px;
      margin-top: 40px;
    }

    button {
      padding: 15px 50px;
      font-size: 1.3rem;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      transition: transform 0.3s, box-shadow 0.3s;
      font-family: inherit;
    }

    .yes-btn {
      background: linear-gradient(135deg, #e75480, #ff6b9d);
      color: white;
      box-shadow: 0 5px 20px rgba(231, 84, 128, 0.4);
    }

    .yes-btn:hover {
      transform: scale(1.1);
      box-shadow: 0 8px 30px rgba(231, 84, 128, 0.6);
    }

    .no-btn {
      background: #ccc;
      color: #666;
      position: absolute;
    }

    .hearts {
      position: fixed;
      width: 100%;
      height: 100%;
      pointer-events: none;
      overflow: hidden;
      top: 0;
      left: 0;
      z-index: -1;
    }

    .heart {
      position: absolute;
      font-size: 20px;
      animation: float 4s ease-in infinite;
      opacity: 0.7;
    }

    @keyframes float {
      0% {
        transform: translateY(100vh) rotate(0deg);
        opacity: 0;
      }
      10% {
        opacity: 0.7;
      }
      90% {
        opacity: 0.7;
      }
      100% {
        transform: translateY(-10vh) rotate(720deg);
        opacity: 0;
      }
    }

    .celebration {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(255, 255, 255, 0.95);
      justify-content: center;
      align-items: center;
      flex-direction: column;
      z-index: 100;
    }

    .celebration h1 {
      font-size: 3rem;
      color: #e75480;
      animation: pulse 0.5s ease infinite alternate;
    }

    .celebration p {
      font-size: 1.5rem;
      color: #666;
      margin-top: 20px;
    }

    @keyframes pulse {
      from { transform: scale(1); }
      to { transform: scale(1.1); }
    }

    .ring {
      font-size: 80px;
      margin-bottom: 20px;
      animation: spin 2s ease-in-out infinite;
    }

    @keyframes spin {
      0%, 100% { transform: rotate(-10deg); }
      50% { transform: rotate(10deg); }
    }
  </style>
</head>
<body>
  <div class="hearts" id="hearts"></div>

  <div class="container">
    <h1>Dear <span class="highlight">Dollie</span> 💕</h1>
    <p class="question">
      Will you be my <span class="highlight">wife</span>? 💍
    </p>
    <div class="buttons">
      <button class="yes-btn" onclick="sayYes()">Yes! 💖</button>
      <button class="no-btn" id="noBtn">No</button>
    </div>
  </div>

  <div class="celebration" id="celebration">
    <div class="ring">💍</div>
    <h1>She said YES! 🎉</h1>
    <p>I love you, Dollie! Forever and always 💕</p>
  </div>

  <script>
    const noBtn = document.getElementById('noBtn');
    const container = document.querySelector('.container');

    // Make the No button run away from the cursor
    noBtn.addEventListener('mouseover', moveButton);
    noBtn.addEventListener('touchstart', moveButton);
    noBtn.addEventListener('click', moveButton);

    function moveButton() {
      const containerRect = container.getBoundingClientRect();
      const btnRect = noBtn.getBoundingClientRect();
      
      // Calculate random position within the container bounds
      const maxX = containerRect.width - btnRect.width - 40;
      const maxY = containerRect.height - btnRect.height - 40;
      
      const randomX = Math.random() * maxX - maxX / 2;
      const randomY = Math.random() * maxY - maxY / 2;
      
      noBtn.style.transform = `translate(${randomX}px, ${randomY}px)`;
    }

    function sayYes() {
      document.getElementById('celebration').style.display = 'flex';
      createConfetti();
    }

    // Floating hearts background
    function createHeart() {
      const heart = document.createElement('div');
      heart.classList.add('heart');
      heart.innerHTML = ['💕', '💖', '💗', '💓', '❤️', '💘'][Math.floor(Math.random() * 6)];
      heart.style.left = Math.random() * 100 + 'vw';
      heart.style.animationDuration = (Math.random() * 3 + 3) + 's';
      heart.style.fontSize = (Math.random() * 20 + 15) + 'px';
      document.getElementById('hearts').appendChild(heart);
      
      setTimeout(() => heart.remove(), 6000);
    }

    setInterval(createHeart, 300);

    // Confetti on Yes
    function createConfetti() {
      for (let i = 0; i < 100; i++) {
        setTimeout(() => {
          const confetti = document.createElement('div');
          confetti.style.cssText = `
            position: fixed;
            width: 10px;
            height: 10px;
            background: hsl(${Math.random() * 360}, 100%, 50%);
            top: -10px;
            left: ${Math.random() * 100}vw;
            z-index: 101;
            border-radius: ${Math.random() > 0.5 ? '50%' : '0'};
            animation: confettiFall ${Math.random() * 3 + 2}s linear forwards;
          `;
          document.body.appendChild(confetti);
          setTimeout(() => confetti.remove(), 5000);
        }, i * 30);
      }
    }

    // Add confetti animation
    const style = document.createElement('style');
    style.textContent = `
      @keyframes confettiFall {
        to {
          transform: translateY(100vh) rotate(${Math.random() * 720}deg);
        }
      }
    `;
    document.head.appendChild(style);
  </script>
</body>
</html>
